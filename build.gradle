plugins {
    id 'base'
    // Apply the Kotlin JVM plugin to add support for Kotlin.
    id 'org.jetbrains.kotlin.jvm' version '1.4.20'
}

allprojects {

    apply plugin: "idea"

    apply plugin: "kotlin"

    group 'org.artbekk.webapplication'

    version '1.0'

    repositories {
        mavenCentral()
        maven { url "https://kotlin.bintray.com/kotlinx" }
        //Mockito
        maven { url "https://dl.bintray.com/mockito/maven" }
        //Spek
        maven { url "https://dl.bintray.com/jetbrains/spek" }

        maven { url "https://plugins.gradle.org/m2/" }
    }
    dependencies {
        // Align versions of all Kotlin components
        implementation group: 'org.jetbrains.kotlin', name: 'kotlin-bom', version: '1.5.0', ext: 'pom'
        //Logger
        implementation 'org.apache.logging.log4j:log4j-api:2.7'
        implementation 'org.apache.logging.log4j:log4j-core:2.7'
        // Use the Kotlin JDK 8 standard library.
        implementation "org.jetbrains.kotlin:kotlin-stdlib-jdk8"
        //Spek
        testCompile 'org.jetbrains.spek:spek-api:1.1.5'
        testCompile "org.jetbrains.kotlin:kotlin-test:1.4.20"
        testCompile "org.jetbrains.kotlin:kotlin-reflect:1.4.20"
        testRuntime 'org.jetbrains.spek:spek-junit-platform-engine:1.1.5'
        //Mockito
        testImplementation "org.mockito:mockito-core:2.+"
        //JUnit
        testImplementation(platform('org.junit:junit-bom:5.7.0'))
        testImplementation "org.junit.jupiter:junit-jupiter"
    }
}